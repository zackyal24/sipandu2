<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard PCL | SIPANDU</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family:'Poppins',sans-serif; background:#f8f9fa; }
    .navbar-brand { font-weight:bold; font-size:clamp(1rem,2.5vw,1.25rem); display:flex; align-items:center; gap:.5rem; }
    .navbar-brand img { width:40px; height:auto; }
    .btn-custom { border-radius:8px; transition:.3s; }
    .btn-custom:hover { transform:scale(1.05); }
    .card { border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,.1); }
    .ubinan-card { margin-bottom:1rem; border:1px solid #e3e3e3; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.03); padding:1rem; background:#fff; transition:.3s; }
    .ubinan-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.1); transform:translateY(-2px); }
    .ubinan-info { font-size:.85rem; color:#6c757d; margin-bottom:.5rem; }
    .ubinan-date { font-size:1rem; font-weight:600; color:#2c3e50; }
    .revisi-alert { background:#fff3cd; border:1px solid #ffeaa7; border-radius:8px; padding:.75rem; margin-top:.75rem; font-size:.85rem; }
    footer { margin-top:60px; font-size:14px; color:#888; }
  </style>
  <script>
    // Check authentication immediately before loading page content
    (function() {
      const user = localStorage.getItem('sipandu_user');
      const token = localStorage.getItem('sipandu_token');
      
      // If no user or token, redirect to login
      if (!user || !token) {
        localStorage.removeItem('sipandu_user');
        localStorage.removeItem('sipandu_token');
        window.location.href = '../../index.html';
        return;
      }
      
      // Verify user is PCL role
      try {
        const userData = JSON.parse(user);
        if (userData.role !== 'pcl') {
          localStorage.removeItem('sipandu_user');
          localStorage.removeItem('sipandu_token');
          window.location.href = '../../index.html';
        }
      } catch (e) {
        localStorage.removeItem('sipandu_user');
        localStorage.removeItem('sipandu_token');
        window.location.href = '../../index.html';
      }
    })();
  </script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="#"><img src="../assets/img/logo.png" alt="Logo"> SIPANDU</a>
      <div class="d-flex align-items-center">
        <div class="dropdown">
          <a href="#" id="userDisplay" class="text-white fw-bold text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">pcl_demo</a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="../auth/ganti_password.html"><i class="bi bi-key me-2"></i>Ganti Password</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="javascript:logout('../index.html')"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-fluid" style="padding-top: 1.5rem;">
    <div class="row justify-content-center">
      <main id="mainContent" class="col-lg-10 px-2 px-md-4">
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="card-title mb-0"><i class="bi bi-clipboard-data me-2"></i>Data Ubinan Anda</h5>
              <a href="./tambah_data.html" class="btn btn-primary btn-sm btn-custom"><i class="bi bi-plus-lg me-1"></i>Tambah Data</a>
            </div>

            <div class="ubinan-list" id="ubinanList">
              <!-- Data akan dimuat dari backend -->
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <footer class="text-center mt-4 mb-3">&copy; <span id="year"></span> SIPANDU - BPS Kabupaten Bekasi</footer>

  <script>document.getElementById('year').textContent=new Date().getFullYear();</script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/api.js"></script>
  <script>const API_BASE = window.location.origin + '/api';</script>
  <script>
    try {
      requireRole('pcl', '../../index.html');
      const u = getSipanduUser();
      if (u) {
        const el = document.getElementById('userDisplay');
        if (el) el.textContent = u.username;
      }
    } catch (e) { console.warn('Auth script error', e); }

    // Load data ubinan dari backend
    document.addEventListener('DOMContentLoaded', async function() {
      const listEl = document.getElementById('ubinanList');
      
      try {
        const res = await fetchWithAuth(API_BASE + '/ubinan');
        if (!res.ok || !res.data?.success) {
          listEl.innerHTML = '<div class="text-center text-muted py-4">Tidak dapat memuat data.</div>';
          return;
        }

        const items = res.data.data || [];
        if (!items.length) {
          listEl.innerHTML = '<div class="text-center text-muted py-4">Belum ada data ubinan.</div>';
          return;
        }

        listEl.innerHTML = items.map(item => {
          const tanggal = new Date(item.tanggal_panen).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
          const lokasi = [item.desa, item.kecamatan].filter(Boolean).join(', ');
          const subround = item.subround ? `Subround ${item.subround}` : '';
          const segmen = (item.nomor_segmen || item.nomor_sub_segmen) ? `${item.nomor_segmen || '-'}${item.nomor_sub_segmen ? ' / ' + item.nomor_sub_segmen : ''}` : '';
          
          let actionBtn = `<a href="./form_monitoring.html?id=${item.id}" class="btn btn-primary btn-sm btn-custom"><i class="bi bi-pencil-square me-1"></i>Isi Form</a>`;

          const statusVal = (item.status || '').toLowerCase();

          if (statusVal === 'selesai') {
            actionBtn = '<span class="badge bg-success"><i class="bi bi-check-circle me-1"></i>Selesai</span>';
          } else if (statusVal === 'revisi') {
            actionBtn = `<a href="./form_monitoring.html?id=${item.id}" class="btn btn-warning btn-sm btn-custom"><i class="bi bi-pencil-square me-1"></i>Perbaiki</a>`;
          } else if (statusVal === 'tidak bisa') {
            actionBtn = '<span class="badge bg-danger"><i class="bi bi-x-circle me-1"></i>Tidak Bisa</span>';
          } else if (item.note_revisi) {
            actionBtn = `<a href="./form_monitoring.html?id=${item.id}" class="btn btn-warning btn-sm btn-custom"><i class="bi bi-exclamation-triangle me-1"></i>Perlu Revisi</a>`;
          }
          // For 'belum' and 'sudah', keep default "Isi Form" button

          let revisiBlock = '';
          if (item.note_revisi) {
            const revisiDate = item.revised_at ? new Date(item.revised_at).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-';
            revisiBlock = `
              <div class="revisi-alert">
                <div class="d-flex align-items-start">
                  <i class="bi bi-exclamation-triangle text-warning me-2 mt-1"></i>
                  <div>
                    <strong>Perlu Revisi:</strong> ${item.note_revisi}
                    <br><small class="text-muted"><i class="bi bi-clock me-1"></i>${revisiDate}</small>
                  </div>
                </div>
              </div>
            `;
          }

          return `
            <div class="ubinan-card">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                  <div class="ubinan-date"><i class="bi bi-calendar3 me-2"></i>${tanggal}</div>
                  <div class="ubinan-info"><i class="bi bi-person me-1"></i>${item.nama_petani || '-'} • <i class="bi bi-geo-alt me-1"></i>${lokasi} • <i class="bi bi-list-ol me-1"></i>${subround}</div>
                </div>
                <div>
                  ${actionBtn}
                </div>
              </div>
              ${revisiBlock}
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Load ubinan error:', err);
        listEl.innerHTML = '<div class="text-center text-muted py-4">Terjadi kesalahan.</div>';
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
