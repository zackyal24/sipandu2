<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah User | SIPANDU</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: #f8f9fc;
      min-height: 100vh;
      padding: clamp(1rem, 3vw, 2rem);
      display: none;
    }
    
    body.authenticated { display: block; }
    
    .card { 
      width: 100%;
      max-width: 600px; 
      margin: 0 auto;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      border: none;
      background: white;
    }
    
    .card-body {
      padding: clamp(1.5rem, 4vw, 2rem);
    }
    
    h4, .card-title {
      font-weight: 600;
      color: #2c3e50;
      font-size: clamp(1.25rem, 3vw, 1.5rem);
      margin-bottom: 1.5rem;
      text-align: center;
    }
    
    .form-label {
      font-weight: 500;
      color: #495057;
      margin-bottom: 0.5rem;
      font-size: clamp(0.875rem, 1.8vw, 1rem);
    }
    
    .form-control, .form-select {
      border-radius: 8px;
      border: 1px solid #e3e6f0;
      padding: clamp(0.6rem, 1.5vw, 0.75rem) clamp(0.8rem, 2vw, 1rem);
      font-size: clamp(0.875rem, 1.8vw, 1rem);
      transition: all 0.3s ease;
    }
    
    .form-control:focus, .form-select:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
    }
    
    .btn { 
      border-radius: 8px; 
      transition: all 0.3s ease;
      font-weight: 500;
      padding: clamp(0.6rem, 1.5vw, 0.75rem) clamp(1rem, 2.5vw, 1.5rem);
      font-size: clamp(0.875rem, 1.8vw, 1rem);
      min-width: clamp(100px, 20vw, 120px);
    }
    
    .btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }
    
    .btn-primary {
      background-color: #0d6efd;
      border-color: #0d6efd;
    }
    
    .btn-primary:hover {
      background-color: #0b5ed7;
      border-color: #0a58ca;
    }
    
    .btn-secondary {
      background-color: #6c757d;
      border-color: #6c757d;
    }
    
    .btn-secondary:hover {
      background-color: #5c636a;
      border-color: #565e64;
    }
    
    .alert {
      border-radius: 8px;
      font-size: clamp(0.875rem, 1.8vw, 1rem);
      padding: clamp(0.6rem, 1.5vw, 0.75rem) clamp(0.8rem, 2vw, 1rem);
      margin-bottom: 1.5rem;
    }
    
    .mb-3 {
      margin-bottom: 1.5rem !important;
    }
    
    .d-flex {
      gap: clamp(0.5rem, 2vw, 1rem);
    }
    
    .required {
      color: #dc3545;
    }
    
    .form-text {
      font-size: 0.875em;
      margin-top: 0.25rem;
    }
    
    /* Field PML - Hidden by default */
    #pmlSection {
      animation: fadeIn 0.3s ease-in;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Mobile optimizations */
    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }
      
      .card-body {
        padding: 1.5rem;
      }
      
      h4, .card-title {
        font-size: 1.25rem;
        margin-bottom: 1rem;
      }
      
      .form-control, .form-select {
        font-size: 0.9rem;
        padding: 0.6rem 0.8rem;
      }
      
      .btn {
        font-size: 0.9rem;
        padding: 0.6rem 1rem;
        min-width: 100px;
      }
      
      .alert {
        font-size: 0.9rem;
        padding: 0.6rem 0.8rem;
      }
      
      .mb-3 {
        margin-bottom: 1rem !important;
      }
    }
    
    /* Extra small devices */
    @media (max-width: 576px) {
      body {
        padding: 0.5rem;
      }
      
      .card {
        border-radius: 10px;
      }
      
      .card-body {
        padding: 1rem;
      }
      
      h4, .card-title {
        font-size: 1.1rem;
        margin-bottom: 0.8rem;
      }
      
      .form-control, .form-select {
        font-size: 0.875rem;
        padding: 0.5rem 0.7rem;
      }
      
      .btn {
        font-size: 0.875rem;
        padding: 0.5rem 0.8rem;
        min-width: 80px;
      }
      
      .alert {
        font-size: 0.875rem;
        padding: 0.5rem 0.7rem;
      }
      
      .d-flex {
        flex-direction: column;
        gap: 0.75rem;
      }
      
      .d-flex .btn {
        width: 100%;
      }
      
      .mb-3 {
        margin-bottom: 0.8rem !important;
      }
    }
  </style>
  <script>
    (function(){
      const rawUser = localStorage.getItem('sipandu_user');
      const token = localStorage.getItem('sipandu_token');
      if (!rawUser || !token) { window.location.replace('../index.html'); return; }
      try {
        const parsed = JSON.parse(rawUser);
        if (parsed.role !== 'supervisor') { window.location.replace('../index.html'); return; }
        document.addEventListener('DOMContentLoaded', function(){ document.body.classList.add('authenticated'); });
      } catch(err) { window.location.replace('../index.html'); }
    })();
  </script>
</head>
<body>

  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12">
        <div class="card">
          <div class="card-body p-4">
            <h4 class="card-title mb-4"><i class="bi bi-person-plus me-2"></i>Tambah Akun Baru</h4>
        
        <div id="message" class="d-none mb-3"></div>
        
        <form id="formTambahUser" autocomplete="off">
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-at me-2"></i>Username <span class="required">*</span></label>
            <input type="text" class="form-control" id="username" placeholder="Masukkan username" required />
          </div>

          <div class="mb-3">
            <label class="form-label"><i class="bi bi-person-badge me-2"></i>Nama Lengkap <span class="required">*</span></label>
            <input type="text" class="form-control" id="namaLengkap" placeholder="Masukkan nama lengkap" required />
          </div>

          <div class="mb-3">
            <label class="form-label"><i class="bi bi-telephone me-2"></i>No HP <span class="required">*</span></label>
            <input type="text" class="form-control" id="noHp" placeholder="Masukkan nomor HP" required />
          </div>
          
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-envelope me-2"></i>Email <span class="required">*</span></label>
            <input type="email" class="form-control" id="email" placeholder="Masukkan email" required />
          </div>
          
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-key me-2"></i>Password <span class="required">*</span></label>
            <input type="password" class="form-control" id="password" placeholder="Masukkan password" required />
          </div>
          
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-shield-check me-2"></i>Role <span class="required">*</span></label>
            <select class="form-select" id="role" required>
              <option value="">-- Pilih Role --</option>
              <option value="pcl">PCL</option>
              <option value="pml">PML</option>
              <option value="supervisor">Supervisor</option>
            </select>
          </div>

          <div class="mb-3" id="pmlSection" style="display:none;">
            <label class="form-label"><i class="bi bi-person-check me-2"></i>PML yang Mengawasi <span class="required">*</span></label>
            <select class="form-select" id="pmlId">
              <option value="">-- Pilih PML --</option>
            </select>
            <div class="text-muted form-text">
              <i class="bi bi-info-circle me-1"></i>PCL harus memilih PML yang akan mengawasi
            </div>
          </div>
          
          <div class="d-flex justify-content-between">
            <a href="./monitoring_akun.html" class="btn btn-secondary">
              <i class="bi bi-arrow-left me-2"></i>Kembali
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save me-2"></i>Simpan Akun
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
</div>

  <script>document.getElementById('year').textContent=new Date().getFullYear();</script>
  <script src="../assets/js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/api.js"></script>
  <script>
    const API_BASE = window.location.origin + '/api';
    let pmlList = [];

    async function loadPML() {
      try {
        const res = await fetchWithAuth(API_BASE + '/users?ts=' + Date.now());
        if (res.ok && res.data?.success) {
          pmlList = (res.data.data || []).filter(u => (u.role || '').toLowerCase() === 'pml');
          const select = document.getElementById('pmlId');
          select.innerHTML = '<option value="">-- Pilih PML Pengawas --</option>';
          pmlList.forEach(pml => {
            const opt = document.createElement('option');
            opt.value = pml.id;
            opt.textContent = `${pml.nama_lengkap} (${pml.username})`;
            select.appendChild(opt);
          });
        }
      } catch (err) {
        console.error('Error loading PML:', err);
      }
    }

    document.getElementById('role').addEventListener('change', function(){
      const pmlSection = document.getElementById('pmlSection');
      const pmlSelect = document.getElementById('pmlId');
      if (this.value === 'pcl') {
        pmlSection.style.display = 'block';
        pmlSelect.required = true;
      } else {
        pmlSection.style.display = 'none';
        pmlSelect.required = false;
        pmlSelect.value = '';
      }
    });

    document.getElementById('formTambahUser').addEventListener('submit', async function(e){
      e.preventDefault();
      const msg = document.getElementById('message');
      msg.innerHTML = '';
      msg.className = 'd-none';

      const namaLengkap = document.getElementById('namaLengkap').value.trim();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const noHp = document.getElementById('noHp').value.trim();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value.trim();
      const pmlId = document.getElementById('pmlId').value.trim();

      if (!namaLengkap || !username || !email || !noHp || !password || !role) {
        msg.className = 'alert alert-danger d-block';
        msg.innerHTML = '<i class="bi bi-exclamation-triangle me-2"></i>Semua field harus diisi!';
        return;
      }

      if (role === 'pcl' && !pmlId) {
        msg.className = 'alert alert-danger d-block';
        msg.innerHTML = '<i class="bi bi-exclamation-triangle me-2"></i>Pilih PML pengawas untuk PCL!';
        return;
      }

      if (password.length < 6) {
        msg.className = 'alert alert-danger d-block';
        msg.innerHTML = '<i class="bi bi-exclamation-triangle me-2"></i>Password minimal 6 karakter!';
        return;
      }

      try {
        const payload = { username, nama_lengkap: namaLengkap, email, no_hp: noHp, password, role };
        if (role === 'pcl' && pmlId) {
          payload.pml_id = parseInt(pmlId);
        }

        const res = await fetchWithAuth(API_BASE + '/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok || !res.data?.success) {
          msg.className = 'alert alert-danger d-block';
          msg.innerHTML = '<i class="bi bi-x-circle me-2"></i>' + (res?.error || 'Gagal menambahkan user');
          return;
        }

        msg.className = 'alert alert-success d-block';
        msg.innerHTML = '<i class="bi bi-check-circle me-2"></i>User berhasil ditambahkan! Mengalihkan...';
        
        setTimeout(() => {
          window.location.href = './monitoring_akun.html';
        }, 1500);
      } catch (err) {
        console.error('Error:', err);
        msg.className = 'alert alert-danger d-block';
        msg.innerHTML = '<i class="bi bi-x-circle me-2"></i>Terjadi kesalahan. Silahkan coba lagi.';
      }
    });

    // Load PML list on page load
    loadPML();
  </script>
</body>
</html>
