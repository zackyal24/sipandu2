<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Data Ubinan | SIPANDU</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background:#f8f9fc; font-family:'Poppins',sans-serif; overflow-x:hidden; display:none; min-height:100vh; padding:clamp(1rem,3vw,2rem); }
    body.authenticated { display:block; }
    .card { border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.1); border:none; background:white; width:100%; max-width:600px; margin:0 auto; }
    .card-body { padding:clamp(1.5rem,4vw,2rem); }
    h4 { font-weight:600; color:#2c3e50; font-size:clamp(1.25rem,3vw,1.5rem); margin-bottom:1.5rem; }
    .form-label { font-weight:500; color:#495057; margin-bottom:0.5rem; font-size:clamp(0.875rem,1.8vw,1rem); }
    .form-control,.form-select { border-radius:8px; border:1px solid #e3e6f0; padding:clamp(0.6rem,1.5vw,0.75rem) clamp(0.8rem,2vw,1rem); font-size:clamp(0.875rem,1.8vw,1rem); transition:all .3s ease; }
    .form-control:focus,.form-select:focus { border-color:#0d6efd; box-shadow:0 0 0 0.2rem rgba(13,110,253,0.25); }
    .btn-custom { border-radius:8px; transition:all .3s ease; font-weight:500; padding:clamp(0.6rem,1.5vw,0.75rem) clamp(1rem,2.5vw,1.5rem); font-size:clamp(0.875rem,1.8vw,1rem); min-width:clamp(100px,20vw,120px); }
    .btn-custom:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(0,0,0,0.2); }
    .btn-primary { background-color:#0d6efd; border-color:#0d6efd; }
    .btn-primary:hover { background-color:#0b5ed7; border-color:#0a58ca; }
    .btn-secondary { background-color:#6c757d; border-color:#6c757d; }
    .btn-secondary:hover { background-color:#5c636a; border-color:#565e64; }
    .alert { border-radius:8px; font-size:clamp(0.875rem,1.8vw,1rem); padding:clamp(0.6rem,1.5vw,0.75rem) clamp(0.8rem,2vw,1rem); margin-bottom:1.5rem; }
    .mb-3 { margin-bottom:1.5rem !important; }
    .d-flex { gap:clamp(0.5rem,2vw,1rem); }
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid #f3f3f3; border-top:2px solid #0d6efd; border-radius:50%; animation:spin 1s linear infinite; margin-right:8px; vertical-align:middle; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
    .loading { display:none; }
    .loading.show { display:inline-block; }
    @media(max-width:768px){
      body { padding:1rem; }
      .card { margin:0; }
      .card-body { padding:1.5rem; }
      h4 { font-size:1.25rem; margin-bottom:1rem; }
      .form-control,.form-select { font-size:0.9rem; padding:0.6rem 0.8rem; }
      .btn-custom { font-size:0.9rem; padding:0.6rem 1rem; min-width:100px; }
      .alert { font-size:0.9rem; padding:0.6rem 0.8rem; }
      .mb-3 { margin-bottom:1rem !important; }
    }
    @media(max-width:576px){
      body { padding:0.5rem; }
      .card { border-radius:10px; }
      .card-body { padding:1rem; }
      h4 { font-size:1.1rem; margin-bottom:0.8rem; }
      .form-control,.form-select { font-size:0.875rem; padding:0.5rem 0.7rem; }
      .btn-custom { font-size:0.875rem; padding:0.5rem 0.8rem; min-width:80px; }
      .alert { font-size:0.875rem; padding:0.5rem 0.7rem; }
      .d-flex { flex-direction:column; gap:0.75rem; }
      .d-flex .btn { width:100%; }
      .mb-3 { margin-bottom:0.8rem !important; }
    }
    @media(min-width:768px) and (max-width:991px){
      .card { max-width:550px; }
      .card-body { padding:1.75rem; }
      .form-control,.form-select { font-size:0.95rem; }
      .btn-custom { font-size:0.95rem; }
    }
    @media(min-width:1200px){
      .card { max-width:650px; }
      .card-body { padding:2.5rem; }
    }
  </style>
  <script>
    (function(){
      const rawUser = localStorage.getItem('sipandu_user');
      const token = localStorage.getItem('sipandu_token');
      if (!rawUser || !token) { window.location.replace('../index.html'); return; }
      try {
        const parsed = JSON.parse(rawUser);
        if (parsed.role !== 'supervisor') { window.location.replace('../index.html'); return; }
        document.addEventListener('DOMContentLoaded', function(){ document.body.classList.add('authenticated'); });
      } catch(err) { window.location.replace('../index.html'); }
    })();
  </script>
</head>
<body>
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12">
        <div class="card">
          <div class="card-body">
            <h4>
              <i class="bi bi-pencil-square me-2"></i>Edit Data Panen
            </h4>
            
            <div id="alertContainer"></div>
            
            <form id="editForm" autocomplete="off">
              <div class="mb-3">
                <label class="form-label">
                  <i class="bi bi-person me-2"></i>Nama Petani
                </label>
                <input type="text" id="nama_petani" name="nama_petani" class="form-control" placeholder="Masukkan nama petani" required>
              </div>
              
              <div class="mb-3">
                <label class="form-label">
                  <i class="bi bi-house me-2"></i>Desa
                </label>
                <input type="text" id="desa" name="desa" class="form-control" placeholder="Masukkan nama desa" required>
              </div>
              
              <div class="mb-3">
                <label class="form-label">
                  <i class="bi bi-geo-alt me-2"></i>Kecamatan
                </label>
                <input type="text" id="kecamatan" name="kecamatan" class="form-control" placeholder="Masukkan nama kecamatan" required>
              </div>
              
              <div class="mb-3">
                <label class="form-label">
                  <i class="bi bi-calendar3 me-2"></i>Tanggal Panen
                </label>
                <input type="date" id="tanggal_panen" name="tanggal_panen" class="form-control" required>
              </div>
              
              <div class="mb-3">
                <label class="form-label">
                  <i class="bi bi-basket me-2"></i>Berat Panen Per Plot (kg)
                </label>
                <input type="number" step="0.01" id="berat_plot" name="berat_plot" class="form-control" placeholder="4.2">
              </div>
              
              <div class="mb-3">
                <label class="form-label">
                  <i class="bi bi-flag me-2"></i>Status
                </label>
                <select id="status" name="status" class="form-select" required>
                  <option value="">-- Pilih Status --</option>
                  <option value="selesai">Selesai</option>
                  <option value="sudah">Sudah</option>
                  <option value="belum">Belum</option>
                  <option value="revisi">Revisi</option>
                  <option value="tidak bisa">Tidak Bisa</option>
                </select>
              </div>
              
              <div class="d-flex justify-content-between">
                <a href="./monitoring_panen.html" class="btn btn-secondary btn-custom">
                  <i class="bi bi-arrow-left me-2"></i>Batal
                </a>
                <button type="submit" id="submitBtn" class="btn btn-primary btn-custom">
                  <div class="spinner loading show" id="spinner"></div>
                  <i class="bi bi-save me-2"></i><span id="submitLabel">Memuat Data...</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/auth.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/api.js"></script>
  <script>
    const API_BASE = window.location.origin + '/api';
    
    function getUrlParam(name){
      const u = new URL(window.location);
      return u.searchParams.get(name);
    }
    
    function showAlert(type, message){
      const container = document.getElementById('alertContainer');
      const alertHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          <i class="bi bi-${type === 'danger' ? 'exclamation-triangle' : 'check-circle'} me-2"></i>${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      `;
      container.innerHTML = alertHTML;
    }
    
    function setLoading(isLoading){
      const submitBtn = document.getElementById('submitBtn');
      const spinner = document.getElementById('spinner');
      const label = document.getElementById('submitLabel');
      if (isLoading){
        submitBtn.disabled = true;
        spinner.classList.add('show');
        label.textContent = 'Menyimpan...';
      } else {
        submitBtn.disabled = false;
        spinner.classList.remove('show');
        label.textContent = 'Simpan';
      }
    }
    
    function formatDateForInput(dateStr){
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return '';
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }
    
    async function loadData(){
      const id = getUrlParam('id');
      if (!id){
        showAlert('danger', 'ID data tidak ditemukan');
        return;
      }
      
      try {
        const res = await fetchWithAuth(API_BASE + '/ubinan/' + id);
        if (!res.ok || !res.data?.success){
          showAlert('danger', 'Gagal memuat data: ' + (res?.error || 'Unknown error'));
          setLoading(false);
          return;
        }
        
        const data = res.data.data;
        document.getElementById('nama_petani').value = data.nama_petani || '';
        document.getElementById('desa').value = data.desa || '';
        document.getElementById('kecamatan').value = data.kecamatan || '';
        document.getElementById('tanggal_panen').value = formatDateForInput(data.tanggal_panen) || '';
        document.getElementById('berat_plot').value = data.berat_plot || '';
        document.getElementById('status').value = (data.status || '').toLowerCase();
        
        setLoading(false);
      } catch(err){
        console.error('Error loading data:', err);
        showAlert('danger', 'Gagal memuat data: ' + err.message);
        setLoading(false);
      }
    }
    
    document.getElementById('editForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const id = getUrlParam('id');
      if (!id){
        showAlert('danger', 'ID data tidak ditemukan');
        return;
      }
      
      setLoading(true);
      
      const formData = {
        nama_petani: document.getElementById('nama_petani').value,
        desa: document.getElementById('desa').value,
        kecamatan: document.getElementById('kecamatan').value,
        tanggal_panen: document.getElementById('tanggal_panen').value,
        berat_plot: parseFloat(document.getElementById('berat_plot').value) || null,
        status: document.getElementById('status').value
      };
      
      try {
        const res = await fetchWithAuth(API_BASE + '/ubinan/' + id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        
        if (!res.ok || !res.data?.success){
          const errorMsg = res.error || res.data?.error || 'Unknown error';
          console.error('Update error:', errorMsg, res);
          showAlert('danger', 'Gagal menyimpan data: ' + errorMsg);
          setLoading(false);
          return;
        }
        
        showAlert('success', 'Data berhasil disimpan');
        setTimeout(() => {
          window.location.replace('./monitoring_panen.html');
        }, 1500);
      } catch(err){
        console.error('Error updating data:', err);
        const errorMsg = err.message || 'Network error atau server tidak tersedia';
        showAlert('danger', 'Gagal menyimpan data: ' + errorMsg);
        setLoading(false);
      }
    });
    
    document.addEventListener('DOMContentLoaded', function(){
      loadData();
    });
  </script>
</body>
</html>
