<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Akun | SIPANDU</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { font-family:'Poppins',sans-serif; background:#f8f9fc; }
    .card { max-width:600px; margin:0 auto; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
    .success-box { position:fixed; top:20px; right:20px; z-index:2000; background:#d1f7d6; border:1px solid #8fd19e; color:#0f5132; padding:12px 16px; border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,0.12); display:none; }
  </style>
</head>
<body>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/api.js"></script>
  <script>
    try { requireRole('supervisor', '../index.html'); } catch(e){}
  </script>
  
  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="./monitoring_akun.html"><i class="bi bi-arrow-left me-2"></i>SIPANDU</a>
    </div>
  </nav>
  
  <div id="successBox" class="success-box">User berhasil diupdate</div>

  <div class="container my-5">
    <div class="card">
      <div class="card-body p-4">
        <h4 class="card-title mb-4">Edit Akun User</h4>
        <form id="editUserForm" onsubmit="handleSubmit(event)">
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-at me-2"></i>Username</label>
            <input type="text" id="username" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-person me-2"></i>Nama Lengkap *</label>
            <input type="text" id="nama_lengkap" class="form-control" placeholder="Nama lengkap" required />
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-envelope me-2"></i>Email *</label>
            <input type="email" id="email" class="form-control" placeholder="Email" required />
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-telephone me-2"></i>No HP *</label>
            <input type="text" id="no_hp" class="form-control" placeholder="No HP" required />
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-tag me-2"></i>Role *</label>
            <select id="role" class="form-select" required onchange="togglePmlField()">
              <option value="">Pilih Role</option>
              <option value="supervisor">Supervisor</option>
              <option value="pml">PML</option>
              <option value="pcl">PCL</option>
            </select>
          </div>
          <div class="mb-3" id="pmlField" style="display:none;">
            <label class="form-label"><i class="bi bi-person-badge me-2"></i>PML Pengawas *</label>
            <select id="pml_id" class="form-select">
              <option value="">Pilih PML</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-key me-2"></i>Password Baru (opsional)</label>
            <input type="password" id="password" class="form-control" placeholder="Kosongkan jika tidak ingin mengganti" minlength="6" />
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-key-fill me-2"></i>Konfirmasi Password Baru</label>
            <input type="password" id="confirm_password" class="form-control" placeholder="Ulangi password baru" minlength="6" />
          </div>
          <div class="d-flex justify-content-between">
            <a href="./monitoring_akun.html" class="btn btn-secondary"><i class="bi bi-arrow-left me-2"></i>Kembali</a>
            <button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i>Simpan</button>
          </div>
        </form>
      </div>
    </div>

    <footer class="text-center small text-muted mt-4">&copy; <span id="year"></span> SIPANDU - BPS Kabupaten Bekasi</footer>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let userId = null;
    let userData = null;

    function togglePmlField() {
      const role = document.getElementById('role').value;
      const pmlField = document.getElementById('pmlField');
      const pmlSelect = document.getElementById('pml_id');
      
      if (role === 'pcl') {
        pmlField.style.display = 'block';
        pmlSelect.required = true;
      } else {
        pmlField.style.display = 'none';
        pmlSelect.required = false;
        pmlSelect.value = '';
      }
    }

    async function loadPMLList() {
      try {
        const res = await fetchWithAuth(API_BASE + '/users');
        if (res.ok && res.data?.success) {
          const pmlUsers = res.data.data.filter(u => u.role === 'pml');
          localStorage.setItem('sipandu_pml_list', JSON.stringify(pmlUsers));
          const pmlSelect = document.getElementById('pml_id');
          pmlSelect.innerHTML = '<option value="">Pilih PML</option>';
          pmlUsers.forEach(pml => {
            pmlSelect.innerHTML += `<option value="${pml.id}">${pml.nama_lengkap} (${pml.username})</option>`;
          });
        }
      } catch (err) {}
    }

    async function loadUserData() {
      const params = new URLSearchParams(window.location.search);
      userId = params.get('id');
      if (!userId) {
        alert('User ID tidak ditemukan');
        window.location.href = './monitoring_akun.html';
        return;
      }
      try {
        const res = await fetchWithAuth(API_BASE + '/users/' + userId);
        if (res.ok && res.data?.success) {
          userData = res.data.data;
          document.getElementById('username').value = userData.username;
          document.getElementById('nama_lengkap').value = userData.nama_lengkap;
          document.getElementById('email').value = userData.email || '';
          document.getElementById('no_hp').value = userData.no_hp || '';
          document.getElementById('role').value = userData.role;
          togglePmlField();
          if (userData.role === 'pcl' && userData.pml_id) {
            document.getElementById('pml_id').value = userData.pml_id;
          }
        }
      } catch (err) {
        alert('Gagal memuat data user: ' + (err.message || 'Network error'));
        window.location.href = './monitoring_akun.html';
      }
    }

    async function handleSubmit(event) {
      event.preventDefault();
      
      const role = document.getElementById('role').value;
      const pml_id = document.getElementById('pml_id').value;
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirm_password').value.trim();
      
      if (role === 'pcl' && !pml_id) {
        alert('PCL harus memiliki PML');
        return;
      }

      if ((password || confirmPassword) && password !== confirmPassword) {
        alert('Konfirmasi password tidak sama');
        return;
      }

      if (password && password.length < 6) {
        alert('Password minimal 6 karakter');
        return;
      }

      const data = {
        username: document.getElementById('username').value.trim(),
        nama_lengkap: document.getElementById('nama_lengkap').value.trim(),
        email: document.getElementById('email').value.trim(),
        no_hp: document.getElementById('no_hp').value.trim(),
        role: role,
        pml_id: pml_id || null
      };

      if (password) {
        data.password = password;
      }

      try {
        const res = await fetchWithAuth(API_BASE + '/users/' + userId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (res.success) {
          const box = document.getElementById('successBox');
          if (box) {
            box.textContent = 'User berhasil diupdate';
            box.style.display = 'block';
            setTimeout(() => {
              box.style.display = 'none';
              window.location.href = './monitoring_akun.html';
            }, 1200);
          } else {
            window.location.href = './monitoring_akun.html';
          }
        } else {
          alert('Error: ' + (res.error || 'Gagal update user'));
        }
      } catch (err) {
        alert('Gagal update user: ' + (err.message || 'Network error'));
      }
    }

    async function handleDelete() {
      if (!confirm('Yakin ingin menghapus user ' + userData.username + '?')) return;
      if (!confirm('Data user dan semua data terkait akan dihapus. Lanjutkan?')) return;

      try {
        const res = await fetchWithAuth(API_BASE + '/users/' + userId, {
          method: 'DELETE'
        });
        if (res.success) {
          alert('User berhasil dihapus');
          window.location.href = './monitoring_akun.html';
        } else {
          alert('Error: ' + (res.error || 'Gagal hapus user'));
        }
      } catch (err) {
        alert('Gagal hapus user: ' + (err.message || 'Network error'));
      }
    }

    document.addEventListener('DOMContentLoaded', async function() {
      document.getElementById('year').textContent = new Date().getFullYear();
      await loadPMLList();
      await loadUserData();
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
