<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | SIPANDU (Static)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family:'Poppins',sans-serif; background-image:url('../assets/img/sawah.jpg'); background-size:cover; background-position:center; background-repeat:no-repeat; min-height:100vh; margin:0; }
    .main-box { background-color:rgba(255,255,255,.9); padding:30px; border-radius:15px; box-shadow:0 8px 25px rgba(0,0,0,.2); max-width:450px; width:100%; }
    .main-box img { width:60px; margin-bottom:15px; }
    .btn-primary { border-radius:8px; background:linear-gradient(135deg,#007bff,#0056b3); border:none; transition:.3s; }
    .btn-primary:hover { background:linear-gradient(135deg,#0056b3,#004085); transform:translateY(-2px); box-shadow:0 5px 15px rgba(0,123,255,.4); }
    .form-control:focus { border-color:#0d6efd; box-shadow:0 0 0 .2rem rgba(13,110,253,.25); }
    .alert { border-radius:10px; border:none; }
    .back-link { color:#6c757d; text-decoration:none; font-size:.9rem; transition:.3s; }
    .back-link:hover { color:#0d6efd; }
    .info-box { background-color:rgba(13,110,253,.1); border:1px solid rgba(13,110,253,.2); border-radius:10px; padding:15px; margin-bottom:20px; }
  </style>
</head>
<body>
  <div class="d-flex align-items-center justify-content-center vh-100">
    <div class="main-box">
      <div class="text-center mb-4">
        <img src="../assets/img/logo.png" alt="Logo" />
        <h4 class="mt-2 mb-1">Lupa Password?</h4>
        <p class="text-muted">Buat password baru untuk akun Anda</p>
      </div>

      <div class="info-box">
        <div class="d-flex">
          <i class="bi bi-info-circle text-primary me-2 mt-1"></i>
          <div>
            <small class="text-primary fw-bold">Catatan Penting:</small><br/>
            <small class="text-muted">Fitur ini untuk reset password ketika Anda <strong>lupa password lama</strong>. Cukup masukkan username dan password baru yang diinginkan.</small>
          </div>
        </div>
      </div>

      <div id="message"></div>

      <form id="resetForm" onsubmit="handleResetPassword(event)">
        <div class="mb-3">
          <label for="username" class="form-label"><i class="bi bi-person me-2"></i>Username</label>
          <input type="text" id="username" class="form-control" placeholder="Masukkan username Anda" required />
          <div class="form-text">Username akun yang lupa password</div>
        </div>

        <div class="mb-3">
          <label for="new_password" class="form-label"><i class="bi bi-key me-2"></i>Password Baru</label>
          <input type="password" id="new_password" class="form-control" placeholder="Buat password baru" minlength="6" required />
          <div class="form-text">Minimal 6 karakter</div>
        </div>

        <div class="mb-4">
          <label for="confirm_password" class="form-label"><i class="bi bi-key-fill me-2"></i>Konfirmasi Password Baru</label>
          <input type="password" id="confirm_password" class="form-control" placeholder="Ketik ulang password baru" minlength="6" required />
        </div>

        <div class="d-grid gap-2 mb-3">
          <button type="submit" class="btn btn-primary"><i class="bi bi-arrow-clockwise me-2"></i>Reset Password Saya (Demo)</button>
        </div>
      </form>

      <div class="text-center">
        <a href="../index.html" class="back-link"><i class="bi bi-arrow-left me-1"></i>Kembali ke Halaman Login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function handleResetPassword(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const newPassword = document.getElementById('new_password').value;
      const confirmPassword = document.getElementById('confirm_password').value;
      const messageDiv = document.getElementById('message');
      messageDiv.className = '';
      messageDiv.innerHTML = '';

      if (!username || !newPassword || !confirmPassword) {
        messageDiv.className = 'alert alert-danger';
        messageDiv.innerHTML = '<i class="bi bi-exclamation-triangle me-2"></i>Semua field harus diisi!';
        messageDiv.classList.remove('d-none');
        return;
      }
      if (newPassword.length < 6) {
        messageDiv.className = 'alert alert-danger';
        messageDiv.innerHTML = '<i class="bi bi-exclamation-triangle me-2"></i>Password minimal 6 karakter!';
        messageDiv.classList.remove('d-none');
        return;
      }
      if (newPassword !== confirmPassword) {
        messageDiv.className = 'alert alert-danger';
        messageDiv.innerHTML = '<i class="bi bi-exclamation-triangle me-2"></i>Konfirmasi password tidak cocok!';
        messageDiv.classList.remove('d-none');
        return;
      }
      if (newPassword.toLowerCase() === username.toLowerCase()) {
        messageDiv.className = 'alert alert-warning';
        messageDiv.innerHTML = '<i class="bi bi-info-circle me-2"></i>Password baru tidak boleh sama dengan username!';
        messageDiv.classList.remove('d-none');
        return;
      }

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, new_password: newPassword })
        });
        let data = null;
        const text = await res.text();
        try { data = text ? JSON.parse(text) : null; } catch (e) { data = null; }
        if (!res.ok) {
          const errMsg = (data && data.error) ? data.error : (text ? text : 'Gagal mereset password');
          messageDiv.className = 'alert alert-danger';
          messageDiv.innerHTML = '<i class="bi bi-x-circle me-2"></i>' + errMsg;
          messageDiv.classList.remove('d-none');
          return;
        }
        messageDiv.className = 'alert alert-success';
        messageDiv.innerHTML = '<i class="bi bi-check-circle me-2"></i>Password berhasil direset. Silakan login.';
        messageDiv.classList.remove('d-none');
        setTimeout(() => { document.getElementById('resetForm').reset(); }, 1500);
      } catch (err) {
        console.error('Reset password fetch error:', err);
        messageDiv.className = 'alert alert-danger';
        messageDiv.innerHTML = '<i class="bi bi-x-circle me-2"></i>Terjadi kesalahan jaringan.';
        messageDiv.classList.remove('d-none');
      }
    }

    document.getElementById('confirm_password').addEventListener('input', function() {
      const newPassword = document.getElementById('new_password').value;
      const confirmPassword = this.value;
      if (confirmPassword && newPassword !== confirmPassword) {
        this.setCustomValidity('Password tidak cocok');
        this.classList.add('is-invalid');
      } else {
        this.setCustomValidity('');
        this.classList.remove('is-invalid');
        if (confirmPassword) { this.classList.add('is-valid'); }
      }
    });

    document.getElementById('new_password').addEventListener('input', function() {
      const username = document.getElementById('username').value.toLowerCase();
      const password = this.value.toLowerCase();
      if (password && password === username) {
        this.setCustomValidity('Password tidak boleh sama dengan username');
        this.classList.add('is-invalid');
      } else {
        this.setCustomValidity('');
        this.classList.remove('is-invalid');
        if (this.value.length >= 6) { this.classList.add('is-valid'); }
      }
    });
  </script>
</body>
</html>
