<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tambah Data Ubinan (Static)</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { font-family:'Poppins',sans-serif; background:#f0f4f8; }
    .card { width:100%; max-width:700px; padding:1.5rem; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); background:#fff; margin:0 auto; }
    .navbar-brand { font-weight:bold; font-size:clamp(1rem,2.5vw,1.25rem); display:flex; align-items:center; gap:.5rem; }
    .navbar-brand img { width:40px; height:auto; }
    footer { color:#888; }
  </style>
  <script>
    // Check authentication immediately before loading page content
    (function() {
      const user = localStorage.getItem('sipandu_user');
      const token = localStorage.getItem('sipandu_token');
      
      // If no user or token, redirect to login
      if (!user || !token) {
        localStorage.removeItem('sipandu_user');
        localStorage.removeItem('sipandu_token');
        window.location.href = '../../index.html';
        return;
      }
      
      // Verify user is PCL role
      try {
        const userData = JSON.parse(user);
        if (userData.role !== 'pcl') {
          localStorage.removeItem('sipandu_user');
          localStorage.removeItem('sipandu_token');
          window.location.href = '../../index.html';
        }
      } catch (e) {
        localStorage.removeItem('sipandu_user');
        localStorage.removeItem('sipandu_token');
        window.location.href = '../../index.html';
      }
    })();
  </script>
</head>
<body>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="#"><img src="../assets/img/logo.png" alt="Logo"> SIPANDU</a>
      <div class="d-flex align-items-center">
        <div class="dropdown">
          <a href="#" id="userDisplay" class="text-white fw-bold text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">pcl_demo</a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="../auth/ganti_password.html"><i class="bi bi-key me-2"></i>Ganti Password</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="javascript:logout('../index.html')"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="container my-3 my-md-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <a class="btn btn-outline-secondary btn-sm" href="javascript:history.back()"><i class="bi bi-arrow-left me-1"></i>Kembali</a>
    </div>
    <div class="card">
      <div class="text-center pb-3 pb-md-4">
        <h1 class="h4">Data Rencana Ubinan</h1>
        <p class="text-muted mb-0">Badan Pusat Statistik (BPS) Kabupaten Bekasi</p>
      </div>

      <!-- Message area -->
      <div id="message" class="mb-3 d-none"></div>

      <form id="formTambahData" onsubmit="handleTambahData(event)">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label"><i class="bi bi-person me-2"></i>Nama Petani</label>
            <input type="text" id="nama_petani" class="form-control" placeholder="Masukkan nama petani" required />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-geo-alt me-2"></i>Kecamatan</label>
            <select id="kecamatan" class="form-select" required onchange="loadDesa()">
              <option value="">-- Pilih Kecamatan --</option>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-house me-2"></i>Desa</label>
            <select id="desa" class="form-select" required disabled>
              <option value="">-- Pilih Desa --</option>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-list-ol me-2"></i>Subround</label>
            <select id="subround" class="form-select" required onchange="updateDateLimits()">
              <option value="">-- Pilih Subround --</option>
              <option value="1">Subround 1</option>
              <option value="2">Subround 2</option>
              <option value="3">Subround 3</option>
            </select>
            <div id="subround-info" class="small text-muted mt-1" style="display:none;"></div>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-calendar me-2"></i>Tanggal Ubinan</label>
            <input type="date" id="tanggal_panen" class="form-control" required disabled />
            <div id="date-info" class="small text-success mt-1" style="display:none;"></div>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-diagram-3 me-2"></i>Nomor Segmen</label>
            <select id="nomor_segmen" class="form-select" required>
              <option value="">-- Pilih Nomor Segmen --</option>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-grid me-2"></i>Nomor Sub Segmen</label>
            <select id="nomor_sub_segmen" name="nomor_sub_segmen" class="form-select" required>
              <option value="">-- Pilih Nomor Sub Segmen --</option>
              <option value="A1">A1</option>
              <option value="A2">A2</option>
              <option value="A3">A3</option>
              <option value="B1">B1</option>
              <option value="B2">B2</option>
              <option value="B3">B3</option>
              <option value="C1">C1</option>
              <option value="C2">C2</option>
              <option value="C3">C3</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label"><i class="bi bi-flag me-2"></i>Status</label>
            <select id="status" class="form-select" required>
              <option value="belum">Belum dilakukan ubinan</option>
              <option value="sudah">Sudah dilakukan ubinan (belum kirim monitoring)</option>
              <option value="selesai">Selesai</option>
              <option value="tidak bisa">Tidak bisa dilakukan ubinan</option>
            </select>
          </div>
          <div class="col-12 pt-2 pt-md-3">
            <div class="d-grid"><button class="btn btn-primary" type="submit" id="submitBtn"><i class="bi bi-save me-2"></i>Simpan</button></div>
          </div>
        </div>
      </form>
    </div>
  </div>

  <footer class="text-center mb-4">&copy; <span id="year"></span> SIPANDU - BPS Kabupaten Bekasi</footer>

  <script>
    const API_BASE = 'http://localhost:5000/api';
    const currentYear = new Date().getFullYear();
    const periods = {
      1: {name:'Januari - April', s:0, e:3},
      2: {name:'Mei - Agustus', s:4, e:7},
      3: {name:'September - Desember', s:8, e:11}
    };

    document.getElementById('year').textContent = currentYear;

    // Format date untuk min/max attribute
    function fmt(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const a = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${a}`;
    }

    // Load Kecamatan
    async function loadKecamatan() {
      try {
        const res = await fetchWithAuth(API_BASE + '/kecamatan');
        const select = document.getElementById('kecamatan');
        if (res.ok && res.data && res.data.success) {
          res.data.data.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.id;
            opt.textContent = item.nama_kecamatan;
            select.appendChild(opt);
          });
        }
      } catch (err) {
        console.error('Error loading kecamatan:', err);
        showMessage('Gagal memuat data kecamatan', 'danger');
      }
    }

    // Load Desa by Kecamatan
    async function loadDesa() {
      const kecamatanId = document.getElementById('kecamatan').value;
      const desaSelect = document.getElementById('desa');
      
      // Reset options
      desaSelect.innerHTML = '<option value="">-- Pilih Desa --</option>';
      desaSelect.disabled = true;

      if (!kecamatanId) return;

      try {
        const res = await fetchWithAuth(`${API_BASE}/desa/${encodeURIComponent(kecamatanId)}`);

        if (res.ok && res.data && res.data.success) {
          const list = res.data.data || [];
          if (!list.length) {
            showMessage('Tidak ada desa untuk kecamatan ini', 'warning');
            return;
          }
          list.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.nama_desa;
            opt.textContent = item.nama_desa;
            desaSelect.appendChild(opt);
          });
          desaSelect.disabled = false;
        } else {
          const errMsg = (res.data && res.data.error) ? res.data.error : `Gagal memuat data desa (status ${res.status})`;
          showMessage(errMsg, 'danger');
        }
      } catch (err) {
        console.error('Error loading desa:', err);
        showMessage('Gagal memuat data desa', 'danger');
      }
    }

    // Load Segmen
    async function loadSegmen() {
      try {
        const res = await fetchWithAuth(API_BASE + '/segmen');
        const select = document.getElementById('nomor_segmen');
        if (res.ok && res.data && res.data.success) {
          res.data.data.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.nomor_segmen;
            opt.textContent = item.nomor_segmen;
            select.appendChild(opt);
          });
        }
      } catch (err) {
        console.error('Error loading segmen:', err);
        showMessage('Gagal memuat data segmen', 'danger');
      }
    }

    // Update date limits based on subround
    function updateDateLimits() {
      const sr = parseInt(document.getElementById('subround').value);
      const date = document.getElementById('tanggal_panen');
      const info = document.getElementById('date-info');
      const subroundInfo = document.getElementById('subround-info');

      if (sr && periods[sr]) {
        const p = periods[sr];
        const min = new Date(currentYear, p.s, 1);
        const max = new Date(currentYear, p.e+1, 0);
        
        date.min = fmt(min);
        date.max = fmt(max);
        date.disabled = false;
        date.value = '';

        info.style.display = 'block';
        info.textContent = `Tanggal harus dalam periode ${p.name} ${currentYear}`;
        info.className = 'small text-success mt-1';

        subroundInfo.style.display = 'block';
        subroundInfo.textContent = `Periode ${p.name} ${currentYear}`;
      } else {
        date.disabled = true;
        date.removeAttribute('min');
        date.removeAttribute('max');
        date.value = '';
        info.style.display = 'none';
        subroundInfo.style.display = 'none';
      }
    }

    // Show message
    function showMessage(msg, type) {
      const msgEl = document.getElementById('message');
      msgEl.className = `alert alert-${type} d-block`;
      msgEl.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-triangle'} me-2"></i>${msg}`;
    }

    // Handle form submission
    async function handleTambahData(e) {
      e.preventDefault();
      
      const nama_petani = document.getElementById('nama_petani').value.trim();
      const kecamatanId = document.getElementById('kecamatan').value;
      const desa = document.getElementById('desa').value;
      const tanggal_panen = document.getElementById('tanggal_panen').value;
      const subround = document.getElementById('subround').value;
      const nomor_segmen = document.getElementById('nomor_segmen').value;
      const nomor_sub_segmen = document.getElementById('nomor_sub_segmen').value.trim();
      const status = document.getElementById('status').value;

      if (!nama_petani || !kecamatanId || !desa || !tanggal_panen || !subround || !nomor_segmen || !nomor_sub_segmen) {
        showMessage('Semua field harus diisi', 'danger');
        return;
      }

      // Get kecamatan name
      const kecamatanOption = document.querySelector(`#kecamatan option[value="${kecamatanId}"]`);
      const kecamatan = kecamatanOption?.textContent || '';

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Menyimpan...';

      try {
        const response = await fetchWithAuth(API_BASE + '/ubinan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nama_petani,
            desa,
            kecamatan,
            tanggal_panen,
            subround: parseInt(subround),
            nomor_segmen,
            nomor_sub_segmen,
            status
          })
        });

        if (response.ok && response.data && response.data.success) {
          showMessage('Data ubinan berhasil ditambahkan!', 'success');
          setTimeout(() => {
            window.location.href = './dashboard_user.html';
          }, 1500);
        } else {
          const errMsg = (response.data && response.data.error) ? response.data.error : 'Gagal menambahkan data';
          showMessage(errMsg, 'danger');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="bi bi-save me-2"></i>Simpan';
        }
      } catch (err) {
        console.error('Error:', err);
        showMessage('Terjadi kesalahan: ' + err.message, 'danger');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-save me-2"></i>Simpan';
      }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      loadKecamatan();
      loadSegmen();
    });

    // Set user display name like dashboard
    (function() {
      try {
        const u = getSipanduUser();
        if (u) {
          const el = document.getElementById('userDisplay');
          if (el) el.textContent = u.username;
        }
      } catch (e) { console.warn('User display error', e); }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
