<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tambah Data Ubinan (Static)</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { font-family:'Poppins',sans-serif; background:#f0f4f8; }
    .card { width:100%; max-width:700px; padding:1.5rem; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); background:#fff; margin:0 auto; }
    .navbar-brand { font-weight:bold; font-size:clamp(1rem,2.5vw,1.25rem); display:flex; align-items:center; gap:.5rem; }
    .navbar-brand img { width:40px; height:auto; }
    footer { color:#888; }
  </style>
</head>
<body>
  <script src="/assets/js/auth.js"></script>
  <script>
    try { requireRole('pcl', '/index.html'); } catch(e){}
  </script>
  <nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="./dashboard_user.html"><img src="../../assets/img/logo.png" alt="Logo" class="me-2"> SIPANDU</a>
      <a class="btn btn-outline-secondary btn-sm" href="javascript:history.back()"><i class="bi bi-arrow-left me-1"></i>Kembali</a>
    </div>
  </nav>

  <div class="container my-3 my-md-5">
    <div class="card">
      <div class="text-center pb-3 pb-md-4">
        <h1 class="h4">Data Rencana Ubinan</h1>
        <p class="text-muted mb-0">Badan Pusat Statistik (BPS) Kabupaten Bekasi</p>
      </div>

      <form onsubmit="event.preventDefault(); alert('Demo: submit dinonaktifkan');">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label"><i class="bi bi-person me-2"></i>Nama Petani</label>
            <input type="text" class="form-control" placeholder="Masukkan nama petani" required />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-geo-alt me-2"></i>Kecamatan</label>
            <select class="form-select" required>
              <option value="">-- Pilih Kecamatan --</option>
              <option>Cikarang</option>
              <option>Cibitung</option>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-house me-2"></i>Desa</label>
            <select class="form-select" required>
              <option value="">-- Pilih Desa --</option>
              <option>Sukamaju</option>
              <option>Sukadami</option>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-list-ol me-2"></i>Subround</label>
            <select id="subround" class="form-select" required>
              <option value="">-- Pilih Subround --</option>
              <option value="1">Subround 1</option>
              <option value="2">Subround 2</option>
              <option value="3">Subround 3</option>
            </select>
            <div id="subround-info" class="small text-muted mt-1" style="display:none;"></div>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-calendar me-2"></i>Tanggal Ubinan</label>
            <input type="date" id="tanggal_panen" class="form-control" required disabled />
            <div id="date-info" class="small text-success mt-1" style="display:none;"></div>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-diagram-3 me-2"></i>Nomor Segmen</label>
            <select class="form-select" required>
              <option value="">-- Pilih Nomor Segmen --</option>
              <option>SG-101</option>
              <option>SG-102</option>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-grid me-2"></i>Nomor Sub Segmen</label>
            <select class="form-select" required>
              <option value="">-- Pilih Nomor Sub Segmen --</option>
              <option>A1</option>
              <option>A2</option>
              <option>B1</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label"><i class="bi bi-flag me-2"></i>Status</label>
            <select class="form-select" required>
              <option value="">-- Pilih Status --</option>
              <option>Belum dilakukan ubinan</option>
              <option>Sudah dilakukan ubinan</option>
              <option>Tidak bisa dilakukan ubinan</option>
            </select>
          </div>
          <div class="col-12 pt-2 pt-md-3">
            <div class="d-grid"><button class="btn btn-primary" type="submit"><i class="bi bi-save me-2"></i>Simpan (Demo)</button></div>
          </div>
        </div>
      </form>
    </div>
  </div>

  <footer class="text-center mb-4">&copy; <span id="year"></span> SIPANDU - BPS Kabupaten Bekasi</footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const currentYear = new Date().getFullYear();
    const periods = {1:{name:'Januari - April',s:0,e:3},2:{name:'Mei - Agustus',s:4,e:7},3:{name:'September - Desember',s:8,e:11}};
    function fmt(d){const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const a=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${a}`;}
    function setDateLimits(sr){const date=document.getElementById('tanggal_panen');const info=document.getElementById('date-info');if(!sr||!periods[sr]){date.disabled=true;date.value='';date.removeAttribute('min');date.removeAttribute('max');info.style.display='block';info.textContent='Pilih subround terlebih dahulu untuk mengaktifkan tanggal';info.className='small text-muted mt-1';return;}const p=periods[sr];const min=new Date(currentYear,p.s,1);const max=new Date(currentYear,p.e+1,0);date.min=fmt(min);date.max=fmt(max);date.disabled=false;info.style.display='block';info.textContent=`Tanggal harus dalam periode ${p.name} ${currentYear}`;info.className='small text-success mt-1';if(date.value){const sel=new Date(date.value);if(sel<min||sel>max){date.value='';}}}
    document.getElementById('subround').addEventListener('change', function(){const sr=parseInt(this.value);const info=document.getElementById('subround-info'); if(sr&&periods[sr]){info.style.display='block';info.textContent=`Periode ${periods[sr].name} ${currentYear}`; setDateLimits(sr);}else{info.style.display='none';setDateLimits(null);} });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
