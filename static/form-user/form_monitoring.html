<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Data Ubinan (Static)</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { font-family:'Poppins',sans-serif; background:#f0f4f8; }
    .card { max-width: 700px; margin: 24px auto; padding: 1.5rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    footer { color:#888; }
  </style>
</head>
<body>
  <script src="/assets/js/auth.js"></script>
  <script>
    try { requireRole('pcl', '/index.html'); } catch(e){}
  </script>
  <nav class="navbar navbar-light bg-white border-bottom sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="./dashboard_user.html">
        <img src="../../assets/img/logo.png" alt="Logo" height="36" class="me-2" /> SIPANDU
      </a>
      <a class="btn btn-outline-secondary btn-sm" href="javascript:history.back()"><i class="bi bi-arrow-left me-1"></i>Kembali</a>
    </div>
  </nav>

  <div class="container my-3 my-md-4">
    <div class="card">
      <div class="text-center pb-3">
        <h1 class="h4 mb-1">Form Data Ubinan</h1>
        <p class="text-muted mb-0">Versi statis untuk demo tampilan</p>
      </div>

      <div id="loadingSpinner" class="text-center mb-3 d-none">
        <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
        <p class="mt-2">Menyimpan data, mohon tunggu...</p>
      </div>

      <form onsubmit="event.preventDefault(); document.getElementById('loadingSpinner').classList.remove('d-none');">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label"><i class="bi bi-person me-2"></i>Nama Petani</label>
            <input type="text" class="form-control" placeholder="Nama" required />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-house me-2"></i>Desa</label>
            <input type="text" class="form-control" placeholder="Desa" required />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-geo-alt me-2"></i>Kecamatan</label>
            <input type="text" class="form-control" placeholder="Kecamatan" required />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-list-ol me-2"></i>Subround</label>
            <input type="text" class="form-control" placeholder="Subround" required />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-calendar me-2"></i>Tanggal Ubinan</label>
            <input type="date" class="form-control" required />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-diagram-3 me-2"></i>Nomor Segmen</label>
            <input type="text" class="form-control" placeholder="Nomor Segmen" required />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label"><i class="bi bi-grid me-2"></i>Nomor Sub Segmen</label>
            <input type="text" class="form-control" placeholder="Nomor Sub Segmen" required />
          </div>
          <div class="col-12">
            <label class="form-label"><i class="bi bi-camera me-2"></i>Upload Foto Serah Terima</label>
            <input type="file" id="foto_serah_terima" class="form-control" accept="image/*" />
            <div id="info_foto_serah_terima" class="file-info small text-muted mt-1" style="display:none;">Info file...</div>
          </div>
          <div class="col-12">
            <label class="form-label"><i class="bi bi-grid-3x3-gap me-2"></i>Upload Foto Bukti Plot Ubinan</label>
            <input type="file" id="foto_bukti_plot_ubinan" class="form-control" accept="image/*" />
            <div id="info_foto_bukti_plot_ubinan" class="file-info small text-muted mt-1" style="display:none;">Info file...</div>
          </div>
          <div class="col-12">
            <label class="form-label"><i class="bi bi-speedometer me-2"></i>Upload Foto Berat Timbangan</label>
            <input type="file" id="foto_berat_timbangan" class="form-control" accept="image/*" />
            <div id="info_foto_berat_timbangan" class="file-info small text-muted mt-1" style="display:none;">Info file...</div>
          </div>
          <div class="col-12">
            <label class="form-label"><i class="bi bi-basket me-2"></i>Berat Panen Per Plot (kg)</label>
            <input type="number" step="0.01" class="form-control" placeholder="Contoh: 5.25" required />
          </div>
          <div class="col-12">
            <div class="d-grid"><button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i>Simpan (Demo)</button></div>
          </div>
        </div>
      </form>
    </div>
  </div>

  <footer class="text-center small mb-4">&copy; <span id="year"></span> SIPANDU - BPS Kabupaten Bekasi</footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function compressImage(file, quality = 0.7, maxWidth = 1024, maxHeight = 768) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = function () {
          let { width, height } = img;
          if (width > height) { if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; } }
          else { if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; } }
          canvas.width = width; canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob(resolve, 'image/jpeg', quality);
        };
        img.src = URL.createObjectURL(file);
      });
    }
    function formatFileSize(bytes) { if (bytes===0) return '0 Bytes'; const k=1024, sizes=['Bytes','KB','MB','GB']; const i=Math.floor(Math.log(bytes)/Math.log(k)); return parseFloat((bytes/Math.pow(k,i)).toFixed(2))+' '+sizes[i]; }
    ['foto_serah_terima','foto_bukti_plot_ubinan','foto_berat_timbangan'].forEach(id=>{
      const input=document.getElementById(id);
      input.addEventListener('change', async (e)=>{
        const file=e.target.files[0]; if(!file) return;
        const infoDiv=document.getElementById('info_'+id); infoDiv.style.display='block';
        infoDiv.textContent = `Original: ${formatFileSize(file.size)} - Mengompres...`;
        try {
          const blob = await compressImage(file, 0.7, 1024, 768);
          const compressedFile = new File([blob], file.name, {type:'image/jpeg', lastModified: Date.now()});
          const dt = new DataTransfer(); dt.items.add(compressedFile); e.target.files = dt.files;
          infoDiv.textContent = `Original: ${formatFileSize(file.size)} → Dikompres: ${formatFileSize(blob.size)}`;
        } catch(err) {
          infoDiv.textContent = `Original: ${formatFileSize(file.size)} - Gagal kompresi`; 
        }
      });
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
