<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selamat Datang - SIPANDU (Static)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-image: url('../assets/img/sawah.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      margin: 0;
    }
    .main-box {
      background-color: rgba(255, 255, 255, 0.85);
      padding: 30px 20px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      max-width: 400px;
      width: 100%;
    }
    .main-box img { width: 80px; margin-bottom: 20px; }
    .main-box h4 { font-weight: 600; color: #333; }
    .btn-primary {
      border-radius: 8px;
      background: linear-gradient(135deg, #007bff, #0056b3);
      border: none;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #0056b3, #004085);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
    }
    .whatsapp-link { color: #6c757d; text-decoration: none; font-size: 0.9rem; font-weight: 500; display: inline-flex; align-items: center; }
    .whatsapp-link:hover { color: #0d6efd; text-decoration: underline; }
    footer { color:#6c757d; }
  </style>
</head>
<body>
  <div class="d-flex align-items-center justify-content-center py-5" style="min-height: 100vh;">
    <div class="main-box text-center">
      <img class="d-block mx-auto" src="../assets/img/logo.png" alt="Logo" />
      <h4 class="text-center mb-4">LOGIN SIPANDU</h4>

      <!-- Message area -->
      <div id="message" class="d-none"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-3 text-start">
          <label for="username" class="form-label">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Masukkan username" required />
        </div>
        <div class="mb-3 text-start">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Masukkan password" required />
        </div>
        <button class="btn btn-primary w-100 mb-3" type="submit">
          <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
        </button>
      </form>

      <div class="text-center">
        <a href="./auth/reset_password.html" class="whatsapp-link" style="color:#0d6efd;">
          <i class="bi bi-key me-2"></i>Lupa Password?
        </a>
      </div>
    </div>
  </div>

  <footer class="text-center small mb-3">&copy; <span id="year"></span> SIPANDU - BPS Kabupaten Bekasi</footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('message');
      msg.className = '';
      msg.innerHTML = '';
      if (!username || !password) {
        msg.className = 'alert alert-danger';
        msg.innerHTML = '<i class="bi bi-exclamation-triangle me-2"></i>Isi username dan password.';
        msg.classList.remove('d-none');
        return;
      }

      let usedFallback = false;
      try {
        // Try backend first at localhost:5000
        const res = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        let data = null;
        const text = await res.text();
        try { data = text ? JSON.parse(text) : null; } catch (e) { data = null; }
        if (res.ok && data && data.success) {
          const user = (data && data.user) ? data.user : { username };
          // Simpan user dan token
          localStorage.setItem('sipandu_user', JSON.stringify(user));
          if (data.token) localStorage.setItem('sipandu_token', data.token);
          msg.className = 'alert alert-success';
          msg.innerHTML = '<i class="bi bi-check-circle me-2"></i>Login berhasil. Mengalihkan...';
          msg.classList.remove('d-none');
          setTimeout(() => {
            const redirectMap = { pml: './admin-biasa/index.html', supervisor: './supervisor/index.html', pcl: './form-user/dashboard_user.html' };
            window.location.href = redirectMap[user.role] || './form-user/dashboard_user.html';
          }, 700);
          return;
        } else {
          const errMsg = (data && data.error) ? data.error : (text ? text : 'Login gagal');
          msg.className = 'alert alert-danger';
          msg.innerHTML = '<i class="bi bi-x-circle me-2"></i>' + errMsg;
          msg.classList.remove('d-none');
          return;
        }
      } catch (err) {
        console.warn('Backend tidak tersedia:', err.message);
        msg.className = 'alert alert-danger';
        msg.innerHTML = '<i class="bi bi-x-circle me-2"></i>Backend tidak tersedia.';
        msg.classList.remove('d-none');
        return;
      }
      // No demo fallback — require backend login
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
