<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ganti Password | SIPANDU (Static)</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background:#f8f9fa; font-family:'Poppins',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .card { max-width:400px; width:100%; border-radius:15px; border:none; box-shadow:0 10px 30px rgba(0,0,0,0.1); background:white; }
    .card-body { padding:2rem; }
    .card-title { font-weight:600; color:#2c3e50; margin-bottom:1.5rem; font-size:clamp(1.25rem,2.5vw,1.5rem); }
    .form-label { font-weight:500; color:#495057; margin-bottom:.5rem; font-size:clamp(.875rem,1.5vw,1rem); }
    .form-control { border-radius:10px; border:1px solid #e3e6f0; padding:.75rem 1rem; font-size:clamp(.875rem,1.5vw,1rem); transition:.3s; }
    .form-control:focus { border-color:#0d6efd; box-shadow:0 0 0 .2rem rgba(13,110,253,.25); }
    .btn-primary { background:#0d6efd; border-color:#0d6efd; border-radius:10px; padding:.75rem 1.5rem; font-weight:500; font-size:clamp(.875rem,1.5vw,1rem); transition:.3s; }
    .btn-primary:hover { background:#0b5ed7; border-color:#0a58ca; transform:translateY(-1px); box-shadow:0 5px 15px rgba(13,110,253,.3); }
    .btn-link { color:#0d6efd; text-decoration:none; font-weight:500; font-size:clamp(.875rem,1.5vw,1rem); transition:.3s; }
    .btn-link:hover { color:#0b5ed7; transform:translateY(-1px); }
    .alert { border-radius:10px; border:none; font-size:clamp(.875rem,1.5vw,1rem); margin-bottom:1rem; }
    .alert-success { background:#d1e7dd; color:#0f5132; }
    .alert-danger { background:#f8d7da; color:#842029; }
    .logo-container { text-align:center; margin-bottom:1.5rem; }
    .logo { width:60px; height:60px; margin-bottom:1rem; }
    .app-name { font-size:clamp(1.1rem,2vw,1.3rem); font-weight:600; color:#2c3e50; margin-bottom:.5rem; }
    .app-subtitle { font-size:clamp(.8rem,1.5vw,.9rem); color:#6c757d; margin-bottom:0; }
    @media(max-width:576px){ body{padding:.5rem;} .card{margin:0;} .card-body{padding:1.5rem;} .form-control{padding:.6rem .8rem;} .btn-primary{padding:.6rem 1.2rem;} }
  </style>
</head>
<body>
  <div class="card shadow">
    <div class="card-body">
      <div class="logo-container">
        <img src="../../assets/img/logo.png" alt="Logo" class="logo" />
        <div class="app-name">SIPANDU</div>
        <div class="app-subtitle">Ganti Password</div>
      </div>

      <div id="message"></div>

      <form id="gantiForm" onsubmit="handleGantiPassword(event)">
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-lock me-2"></i>Password Lama</label>
          <input type="password" id="passwordLama" class="form-control" placeholder="Masukkan password lama" required />
        </div>

        <div class="mb-3">
          <label class="form-label"><i class="bi bi-key me-2"></i>Password Baru</label>
          <input type="password" id="passwordBaru" class="form-control" placeholder="Masukkan password baru" required minlength="6" />
        </div>

        <div class="mb-3">
          <label class="form-label"><i class="bi bi-shield-check me-2"></i>Konfirmasi Password Baru</label>
          <input type="password" id="konfirmasiPassword" class="form-control" placeholder="Konfirmasi password baru" required minlength="6" />
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-2"></i>Simpan Password</button>
        </div>

        <div class="text-center">
          <a href="javascript:history.back()" class="btn btn-link"><i class="bi bi-arrow-left me-2"></i>Kembali</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script>
    const API_BASE = 'http://localhost:5000/api';
    try { requireAuth('/index.html'); } catch(e){}
    async function handleGantiPassword(e) {
      e.preventDefault();
      const passwordLama = document.getElementById('passwordLama').value;
      const passwordBaru = document.getElementById('passwordBaru').value;
      const konfirmasiPassword = document.getElementById('konfirmasiPassword').value;
      const messageDiv = document.getElementById('message');

      if (passwordBaru !== konfirmasiPassword) {
        messageDiv.innerHTML = '<div class="alert alert-danger">Konfirmasi password baru tidak cocok.</div>';
        return;
      }
      if (passwordBaru.length < 6) {
        messageDiv.innerHTML = '<div class="alert alert-danger">Password baru minimal 6 karakter.</div>';
        return;
      }

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Memproses...';

      try {
        const token = localStorage.getItem('sipandu_token');
        const response = await fetch(`${API_BASE}/auth/change-password`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            password_lama: passwordLama,
            password_baru: passwordBaru
          })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          messageDiv.innerHTML = '<div class="alert alert-success"><i class="bi bi-check-circle me-2"></i>Password berhasil diubah!</div>';
          setTimeout(() => {
            document.getElementById('gantiForm').reset();
            messageDiv.innerHTML = '';
            history.back();
          }, 1500);
        } else {
          messageDiv.innerHTML = `<div class="alert alert-danger"><i class="bi bi-x-circle me-2"></i>${result.error || 'Gagal mengubah password'}</div>`;
        }
      } catch (error) {
        messageDiv.innerHTML = `<div class="alert alert-danger"><i class="bi bi-x-circle me-2"></i>Terjadi kesalahan: ${error.message}</div>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Simpan Password';
      }
    }

    document.getElementById('konfirmasiPassword').addEventListener('input', function() {
      const passwordBaru = document.getElementById('passwordBaru').value;
      const konfirmasiPassword = this.value;
      if (konfirmasiPassword && passwordBaru !== konfirmasiPassword) {
        this.setCustomValidity('Password tidak cocok');
        this.classList.add('is-invalid');
      } else {
        this.setCustomValidity('');
        this.classList.remove('is-invalid');
        if (konfirmasiPassword) { this.classList.add('is-valid'); }
      }
    });
  </script>
</body>
</html>
