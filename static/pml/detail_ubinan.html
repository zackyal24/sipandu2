<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Panen | SIPANDU (Static)</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body { background:#f8f9fc; font-family:'Poppins',sans-serif; overflow-x:hidden; }
    .navbar-brand { font-weight:bold; font-size:20px; }
    .card { border-radius:12px; }
    img.preview { width:250px; height:180px; object-fit:cover; border:1px solid #ddd; border-radius:8px; padding:5px; display:block; margin:0 auto; }
    @media(max-width:768px){ img.preview{ width:150px; height:120px; } }
    @media(max-width:576px){ img.preview{ width:120px; height:100px; } }
    footer { margin-top:60px; font-size:14px; color:#888; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="./index.html">
        <img src="../assets/img/logo.png" alt="Logo" width="40" class="me-2"> SIPANDU
      </a>
      <div class="d-flex align-items-center">
        <div class="dropdown">
          <a href="#" class="text-white fw-bold text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">pml_demo</a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="../auth/ganti_password.html"><i class="bi bi-key me-2"></i>Ganti Password</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="javascript:logout('../index.html')"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="container my-4" style="padding-top: 1rem;">
    <div class="card shadow-sm">
      <div class="card-body">
        <a href="javascript:history.back()" class="btn btn-outline-primary btn-custom mb-3">
          <i class="bi bi-arrow-left me-2"></i>Kembali
        </a>
        <div class="d-flex justify-content-end mb-3">
          <button id="exportPDF" class="btn btn-outline-secondary btn-custom">
            <i class="bi bi-file-earmark-pdf me-2"></i>Export PDF
          </button>
        </div>
        <div id="detail-panen">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0">Detail Data Ubinan</h3>
          </div>
          <div class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Memuat data...</p>
          </div>
        </div>
      </div>
    </div>
    <footer class="text-center mt-4 mb-3">&copy; <span id="year"></span> SIPANDU - BPS Kabupaten Bekasi</footer>
  </div>

  <script>document.getElementById('year').textContent=new Date().getFullYear();</script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script>
    const API_BASE = 'http://localhost:5000/api';
    
    try {
      requireRole('pml', '../index.html');
      const u = getSipanduUser();
      if (u) {
        const el = document.querySelector('.dropdown-toggle');
        if (el) el.textContent = u.username;
      }
    } catch (e) { console.warn('Auth script error', e); }

    // Get ID from URL parameter
    function getIdFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('id');
    }

    // Format date untuk display
    function formatDate(dateString) {
      if (!dateString) return '-';
      const date = new Date(dateString);
      return date.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    // Load detail data
    async function loadDetailData() {
      const id = getIdFromUrl();
      
      if (!id) {
        alert('ID data tidak ditemukan');
        window.location.href = './index.html';
        return;
      }

      try {
        const response = await fetchWithAuth(`${API_BASE}/ubinan/${id}`);
        
        if (!response.ok || !response.data || !response.data.success) {
          alert('Gagal memuat data: ' + (response.data?.error || 'Unknown error'));
          window.location.href = './index.html';
          return;
        }

        const data = response.data.data;
        renderDetail(data);
      } catch (error) {
        console.error('Error loading detail:', error);
        alert('Terjadi kesalahan: ' + error.message);
        window.location.href = './index.html';
      }
    }

    // Render detail data
    function renderDetail(data) {
      const statusVal = (data.status || '').toLowerCase();
      let statusBadge = '<span class="badge bg-secondary">Belum</span>';
      
      if (statusVal === 'selesai') {
        statusBadge = '<span class="badge bg-success">Selesai</span>';
      } else if (statusVal === 'sudah') {
        statusBadge = '<span class="badge bg-primary">Sudah</span>';
      } else if (statusVal === 'revisi') {
        statusBadge = '<span class="badge bg-warning text-dark">Revisi</span>';
      } else if (statusVal === 'tidak bisa') {
        statusBadge = '<span class="badge bg-danger">Tidak Bisa</span>';
      }

      const beratPlot = data.berat_plot ? `<span class="fw-bold text-primary">${parseFloat(data.berat_plot).toFixed(2)} kg</span>` : '<span class="text-muted">Belum terdata</span>';
      const gkp = data.gkp ? `<span class="fw-bold">${parseFloat(data.gkp).toFixed(2)} ku/ha</span>` : '<span class="text-muted">Belum terdata</span>';
      const gkg = data.gkg ? `<span class="fw-bold">${parseFloat(data.gkg).toFixed(2)} ku/ha</span>` : '<span class="text-muted">Belum terdata</span>';
      const ku = data.ku ? `<span class="fw-bold text-success">${parseFloat(data.ku).toFixed(2)} ku/ha</span>` : '<span class="text-muted">Belum terdata</span>';

      // Render foto dengan preview
      const fotoSerahTerima = data.foto_serah_terima 
        ? `<img src="http://localhost:5000/${data.foto_serah_terima}" class="preview" alt="Foto Serah Terima" onclick="window.open(this.src, '_blank')" style="cursor:pointer;">`
        : '<span class="text-muted">Belum terdata</span>';
      
      const fotoBuktiPlot = data.foto_bukti_plot_ubinan
        ? `<img src="http://localhost:5000/${data.foto_bukti_plot_ubinan}" class="preview" alt="Foto Bukti Plot" onclick="window.open(this.src, '_blank')" style="cursor:pointer;">`
        : '<span class="text-muted">Belum terdata</span>';
      
      const fotoBeratTimbangan = data.foto_berat_timbangan
        ? `<img src="http://localhost:5000/${data.foto_berat_timbangan}" class="preview" alt="Foto Berat Timbangan" onclick="window.open(this.src, '_blank')" style="cursor:pointer;">`
        : '<span class="text-muted">Belum terdata</span>';

      // Revisi block jika ada
      let revisiBlock = '';
      if (data.note_revisi) {
        const revisiDate = data.revised_at ? formatDate(data.revised_at) : '-';
        revisiBlock = `
          <div class="alert alert-warning mb-3">
            <h6 class="alert-heading"><i class="bi bi-exclamation-triangle me-2"></i>Catatan Revisi</h6>
            <p class="mb-1">${data.note_revisi}</p>
            <small class="text-muted">Tanggal: ${revisiDate}</small>
          </div>
        `;
      }

      const tableHtml = `
        <table class="table table-bordered">
          <tr><th style="width:40%;">Nama Petani</th><td>${data.nama_petani || '-'}</td></tr>
          <tr><th>Desa</th><td>${data.desa || '-'}</td></tr>
          <tr><th>Kecamatan</th><td>${data.kecamatan || '-'}</td></tr>
          <tr><th>Tanggal Panen</th><td>${formatDate(data.tanggal_panen)}</td></tr>
          <tr><th>Subround</th><td>${data.subround || '-'}</td></tr>
          <tr><th>Nomor Segmen</th><td>${data.nomor_segmen || '-'}</td></tr>
          <tr><th>Nomor Sub Segmen</th><td>${data.nomor_sub_segmen || '-'}</td></tr>
          <tr><th>Status</th><td>${statusBadge}</td></tr>
          <tr><th>Berat Ubinan (Plot)</th><td>${beratPlot}</td></tr>
          <tr><th>Estimasi Gabah Kering Panen (GKP)</th><td>${gkp}</td></tr>
          <tr><th>Estimasi Gabah Kering Giling (GKG)</th><td>${gkg}</td></tr>
          <tr><th>Estimasi Produksi Beras (KU)</th><td>${ku}</td></tr>
          <tr><th>Foto Serah Terima</th><td>${fotoSerahTerima}</td></tr>
          <tr><th>Foto Bukti Plot Ubinan</th><td>${fotoBuktiPlot}</td></tr>
          <tr><th>Foto Berat Timbangan</th><td>${fotoBeratTimbangan}</td></tr>
        </table>
      `;

      document.getElementById('detail-panen').innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="fw-bold mb-0">Detail Data Ubinan</h3>
        </div>
        ${revisiBlock}
        ${tableHtml}
      `;
    }

    // Load on page load
    window.addEventListener('DOMContentLoaded', loadDetailData);
  </script>
  <script>
  document.getElementById('exportPDF').addEventListener('click', function(){
    var element=document.getElementById('detail-panen');
    html2pdf().from(element).set({ margin:0.5, filename:'detail-panen-demo.pdf', html2canvas:{scale:2}, jsPDF:{orientation:'portrait', unit:'cm', format:'a4'} }).save();
  });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
