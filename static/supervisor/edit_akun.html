<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Akun | SIPANDU (Static)</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { font-family:'Poppins',sans-serif; background:#f8f9fc; }
    .card { max-width:600px; margin:0 auto; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="./monitoring_akun.html"><i class="bi bi-arrow-left me-2"></i>SIPANDU</a>
    </div>
  </nav>
  <div class="container my-5">
    <div class="card">
      <div class="card-body p-4">
        <h4 class="card-title mb-4">Edit Akun User (Demo)</h4>
        <form onsubmit="event.preventDefault(); alert('Demo: submit dinonaktifkan');">
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-person me-2"></i>Nama Lengkap</label>
            <input type="text" class="form-control" placeholder="Nama lengkap" value="Admin Supervisor" required />
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-at me-2"></i>Username</label>
            <input type="text" class="form-control" placeholder="Username" value="supervisor1" readonly />
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-envelope me-2"></i>Email</label>
            <input type="email" class="form-control" placeholder="Email" value="supervisor@example.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-telephone me-2"></i>No HP</label>
            <input type="text" class="form-control" placeholder="No HP" value="081234567890" required />
          </div>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-tag me-2"></i>Role</label>
            <select class="form-select" required>
              <option selected>supervisor</option>
              <option>pml</option>
              <option>pcl</option>
            </select>
          </div>
          <div class="row">
            <div class="col-12 col-sm-6">
              <button type="submit" class="btn btn-primary w-100"><i class="bi bi-save me-2"></i>Simpan (Demo)</button>
            </div>
            <div class="col-12 col-sm-6">
              <button type="button" class="btn btn-outline-danger w-100"><i class="bi bi-trash me-2"></i>Hapus (Demo)</button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <footer class="text-center small text-muted mt-4">&copy; <span id="year"></span> SIPANDU</footer>
  </div>
  <script>document.getElementById('year').textContent=new Date().getFullYear();</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
